use_default_settings: true

server:
  bind_address: "127.0.0.1"
  port: 8888
  secret_key: "searxng-proxy-search-secret-key-change-me"

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "zh-CN"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
  - name: brave
    engine: brave
    shortcut: br
    disabled: false

outgoing:
  # 代理由 FastAPI 服务动态管理，SearXNG 本身直连
  # 实际代理在 searxng_client.py 中通过 httpx 实现
  request_timeout: 10.0
  useragent_suffix: ""
